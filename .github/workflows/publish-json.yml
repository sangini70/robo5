name: Publish JSON

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-json
  cancel-in-progress: false

jobs:
  sync-json:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate public JSON
        run: npm run sync-json
        env:
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}

      - name: Sync with latest main before checking generated JSON
        shell: bash
        run: |
          git fetch origin main
          git rebase --autostash origin/main

      - name: Check public data changes
        id: changes
        shell: bash
        run: |
          if [ -n "$(git status --short -- public/data)" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            git status --short -- public/data
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push generated JSON
        if: steps.changes.outputs.has_changes == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data
          git commit -m "chore(sync): regenerate public JSON [skip ci]"
          git fetch origin main
          git rebase origin/main
          git push origin HEAD:main

      - name: No generated JSON changes
        if: steps.changes.outputs.has_changes != 'true'
        run: echo "No public data changes detected."
